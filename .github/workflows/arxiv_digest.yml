name: arXiv Daily Digest

on:
  schedule:
    # 11:00 AM hora de Chile (UTC-3 en horario estándar) = 14:00 UTC
    # Si es horario de verano (UTC-4), serían las 15:00 UTC
    # Cron usa UTC siempre.
    - cron: '0 14 * * *'
  workflow_dispatch:  # permite ejecutarlo manualmente desde la UI

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install feedparser
          # Descomenta solo el que vayas a usar:
          pip install google-generativeai
          # pip install groq

      - name: Run digest
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python arxiv_daily_digest_free.py
